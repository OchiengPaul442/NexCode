<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="260" viewBox="0 0 520 260">
  <style>
    .bg{fill:#0f0f0f}
    .panel{fill:#171717;stroke:#262626}
    .item{fill:#1f1f1f}
    .danger{fill:#ff6b6b}
    .text{fill:#e6eef3;font-family:Inter,Arial,sans-serif;font-size:13px}
    .muted{fill:#9aa2a6;font-family:Inter,Arial,sans-serif;font-size:12px}
  </style>
  <rect class="bg" x="0" y="0" width="520" height="260"/>
  <rect class="panel" x="20" y="20" width="480" height="220" rx="8"/>
  <text x="36" y="48" class="text">Approvals</text>

  <g transform="translate(36,70)">
    <rect class="item" x="0" y="0" width="420" height="44" rx="6"/>
    <text x="12" y="30" class="text">Default Approvals — Copilot uses your configured settings</text>

    <rect class="item" x="0" y="64" width="420" height="44" rx="6"/>
    <text x="12" y="94" class="text">Bypass Approvals — All tool calls auto-approved</text>

    <rect class="danger" x="0" y="128" width="420" height="44" rx="6"/>
    <text x="12" y="156" class="text">Autopilot (Preview) — Autonomously iterates from start to finish</text>
  </g>
</svg>