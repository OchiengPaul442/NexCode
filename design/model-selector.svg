    <text x="12" y="26" class="text">Claude Opus 4.6 · High  · 3x</text>

    <rect class="option" x="300" y="0" width="240" height="40" rx="6"/>
    <text x="312" y="26" class="text">GPT-5 mini · High · 0x</text>

